<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>meow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── password gate ── -->
  <div id="gate">
    <div class="gate-card">
      <!-- <span class="gate-sparkle">✦</span> -->
      <p class="gate-title">✨ enter password ✨</p>
      <form class="gate-form" id="gate-form" autocomplete="off">
        <input
          id="gate-input"
          class="gate-input"
          type="password"
          placeholder=" "
          autocomplete="current-password"
          autofocus
        />
        <button class="gate-btn" type="submit">enter</button>
        <p class="gate-error" id="gate-error" aria-live="polite"></p>
      </form>
    </div>
  </div>

  <!-- ── archive ── -->
  <div id="archive" aria-hidden="true">

    <header class="site-header">
      <div class="header-inner">
        <h1 class="site-title" id="site-title">archive</h1>
        <div class="search-wrap">
          <span class="search-icon" aria-hidden="true">⌕</span>
          <input
            id="search"
            class="search-input"
            type="search"
            placeholder="search..."
            aria-label="search resources"
          />
        </div>
      </div>
    </header>

    <div class="filters" role="group" aria-label="filter by type">
      <button class="filter-tab active" data-type="all">all</button>
      <button class="filter-tab" data-type="link">links</button>
      <button class="filter-tab" data-type="note">notes</button>
      <div id="tag-filters" style="display:contents"></div>
    </div>

    <main>
      <div class="cards-grid" id="cards-grid" role="list"></div>
    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
